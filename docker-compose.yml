version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: wrestleguess-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: wrestleguess
      POSTGRES_USER: wrestleguess
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-localdev}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wrestleguess"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local
